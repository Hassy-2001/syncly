{% load static %}
<header class="main-header">
  <div class="header-container">
    <div class="header-left">
      <a href="{% url 'home' %}" class="logo" aria-label="Syncly home">
        <img src="{% static 'img/syncly-logo.png' %}" alt="Syncly logo">
      </a>
    </div>

    <div class="header-center">
      <form action="{% url 'home' %}" method="get" class="search-form">
        <div class="search-pill">
          <input type="text" name="query" placeholder="Search rooms, topics, or people" aria-label="Search rooms, topics, or people">
          <button type="submit" aria-label="Search">
            <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
              <path d="m21 21-4.35-4.35M10.8 18a7.2 7.2 0 1 1 0-14.4 7.2 7.2 0 0 1 0 14.4Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
      </form>
    </div>

    <div class="header-right">
      <nav class="nav-links" aria-label="Main navigation">
        <a href="{% url 'topics' %}" class="nav-link">Topics</a>
        <a href="{% url 'activity' %}" class="nav-link">Activity</a>
      </nav>
      <button class="theme-toggle" id="themeToggle" type="button" aria-label="Switch color theme">
        <svg class="theme-icon theme-icon-sun" width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="12" r="4" fill="none" stroke="currentColor" stroke-width="2"/>
          <path d="M12 2v2m0 16v2M4.93 4.93l1.42 1.42m11.3 11.3 1.42 1.42M2 12h2m16 0h2M4.93 19.07l1.42-1.42m11.3-11.3 1.42-1.42" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <svg class="theme-icon theme-icon-moon" width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M20.5 14.6A8 8 0 0 1 9.4 3.5 8.5 8.5 0 1 0 20.5 14.6Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
        </svg>
      </button>
      <button class="mobile-search-toggle" id="mobileSearchToggle" type="button" aria-label="Open search" aria-expanded="false">
        <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
          <path d="m21 21-4.35-4.35M10.8 18a7.2 7.2 0 1 1 0-14.4 7.2 7.2 0 0 1 0 14.4Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>

      {% if request.user.is_authenticated %}
        <a href="{% url 'notifications' %}" class="notification-link" aria-label="Notifications">
          <span>Notifications</span>
          {% if unread_notifications_count %}
            <strong>{{ unread_notifications_count }}</strong>
          {% endif %}
        </a>
        <div class="user-menu" id="userMenu">
          <button class="user-menu-trigger" id="userMenuBtn" type="button" aria-haspopup="menu" aria-expanded="false">
            <span class="nav-user-avatar" aria-hidden="true">
              {% if request.user.profile.photo %}
                <img src="{{ request.user.profile.photo.url }}" alt="">
              {% else %}
                <span>{{ request.user.username|first|upper }}</span>
              {% endif %}
            </span>
            <span class="nav-username">@{{ request.user.username }}</span>
            <svg class="caret" width="16" height="16" viewBox="0 0 24 24" aria-hidden="true">
              <path d="m6 9 6 6 6-6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <div class="user-dropdown" id="userDropdown" role="menu">
            <a class="dropdown-item" href="{% url 'update-profile' %}">Edit profile</a>
            <a class="dropdown-item danger" href="{% url 'logout_user' %}">Log out</a>
          </div>
        </div>
      {% else %}
        <a href="{% url 'login_user' %}" class="btn btn-primary">Log in</a>
      {% endif %}
    </div>
  </div>

  <nav class="mobile-nav-links" aria-label="Mobile navigation">
    <a href="{% url 'topics' %}" class="mobile-nav-link">Topics</a>
    <a href="{% url 'activity' %}" class="mobile-nav-link">Activity</a>
  </nav>
</header>
