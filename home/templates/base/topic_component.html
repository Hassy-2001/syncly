<section class="topic-panel">
  <div class="panel-heading">
    <p class="section-eyebrow">Explore</p>
    <h3>Topics</h3>
  </div>

  <div class="topic-link">
    <h3><a href="{% url 'topics' %}">All topics</a><span>{{ topics.count }}</span></h3>
  </div>

  {% for topic in topics %}
    <div class="topic-link">
      <h3>
        <a href="{% url 'home' %}?query={{ topic.name }}">{{ topic.name }}</a>
        <span>{{ topic.room_set.all.count }}</span>
      </h3>
    </div>
  {% empty %}
    <p class="empty-state">No topics have been added yet.</p>
  {% endfor %}

  <div class="topic-more">
    <a href="{% url 'topics' %}" class="btn-more">View all topics</a>
  </div>
</section>
