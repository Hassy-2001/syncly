{% extends 'Main.html' %}
{% block content %}

<div class="delete-container">
  <section class="delete-card">
    <p class="section-eyebrow">Confirm action</p>
    <h1>Delete this item?</h1>
    <p>Are you sure you want to delete <strong>"{% if delete_room %}{{ delete_room }}{% else %}{{ delete_message }}{% endif %}"</strong>?</p>

    <form action="" method="post">
      {% csrf_token %}
      <a href="{{ request.META.HTTP_REFERER }}" class="btn btn-cancel">Go back</a>
      <input type="submit" value="Delete" class="btn btn-confirm">
    </form>
  </section>
</div>

{% endblock content %}
