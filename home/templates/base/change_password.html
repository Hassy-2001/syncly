{% extends 'Main.html' %}
{% block content %}

<div class="form-container">
  <section class="form-card">
    <div class="form-heading">
      <div class="form-heading__top">
        <a href="{% url 'user-profile' request.user.id %}" class="back-arrow">Back</a>
        <p class="section-eyebrow">Security</p>
      </div>
      <h1 class="form-title">Change password</h1>
      <p class="form-subtitle">Update your password while keeping your session active.</p>
    </div>

    <form action="" method="post" id="authForm">
      {% csrf_token %}
      {% for field in form %}
        <div class="form-group">
          <label for="{{ field.id_for_label }}">{{ field.label }}</label>
          <div class="input-group">
            {{ field }}
            <button class="toggle-eye" type="button" data-target="{{ field.id_for_label }}">Show</button>
          </div>
          {% for error in field.errors %}
            <div class="caps-hint reset-error">{{ error }}</div>
          {% endfor %}
        </div>
      {% endfor %}

      <div class="button-group">
        <a href="{% url 'user-profile' request.user.id %}" class="btn cancel-btn">Cancel</a>
        <button type="submit" class="btn update-btn">Update password</button>
      </div>
    </form>
  </section>
</div>

<script>
  document.querySelectorAll('.toggle-eye').forEach(btn => {
    btn.addEventListener('click', () => {
      const input = document.getElementById(btn.getAttribute('data-target'));
      if (!input) return;
      const show = input.type === 'password';
      input.type = show ? 'text' : 'password';
      btn.textContent = show ? 'Hide' : 'Show';
    });
  });
</script>

{% endblock content %}
